<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Informer.js Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Gothic:wdth@87.5&display=swap" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>

<body>
  <div class="logo">
    <img src="head-image.png" />
    <h2>Audio Analysis with</h2>
    <h1>Informer.js</h1>
  </div>
  <div id="status" class="status loading">Loading libraries...</div>

  <div class="controls">
    <h2>Audio uploader</h2>

    <div class="control-group">
      <label for="audioFile">Upload audio:</label>
      <input type="file" id="audioFile" accept="audio/*" />
    </div>

    <div class="control-group">
      <label for="fftSize">FFT and Buffer Size:</label>
      <select id="fftSize">
        <option value="1024">1024</option>
        <option value="2048">2048</option>
        <option value="4096" selected>4096</option>
        <option value="8192">8192</option>
        <option value="16384">16384</option>
      </select>
    </div>

    <div class="control-group control-group--checkbox">
      <label for="spectrogramToggle">Show spectrogram:</label>
      <input type="checkbox" id="spectrogramToggle" checked />
    </div>

    <div class="control-group control-group--checkbox">
      <label for="overlayToggle">Overlay descriptors:</label>
      <input type="checkbox" id="overlayToggle" />
    </div>

    <div class="control-group control-group--checkbox">
      <label for="smoothToggle">Smooth descriptors:</label>
      <input type="checkbox" id="smoothToggle" />
    </div>

    <div class="control-group" id="smoothAmountGroup" style="display: none">
      <label for="smoothAmount">Smoothing amount:</label>
      <div class="range-with-value">
        <input type="range" id="smoothAmount" min="0" max="0.95" step="0.01" value="0.4" />
        <span id="smoothAmountValue">0.40</span>
      </div>
    </div>

    <button id="analyzeBtn" disabled>Analyze Audio</button>
    <button id="downloadCsvBtn" disabled>Download CSV</button>
  </div>

  <div class="descriptor-rows">
    <div id="time-descriptor-legend" class="descriptor-row">
      <strong style="color: #388e3c; margin-right: 10px">⏱️ Time:</strong>
    </div>
    <div id="freq-descriptor-legend" class="descriptor-row">
      <strong style="color: #d32f2f; margin-right: 10px">📊 Frequency:</strong>
    </div>
  </div>
  <div class="result-section" style="margin-top: 20px; position: relative">
    <h2>📈 Analysis Results</h2>
    <div id="canvasContainer" style="
          width: 100%;
          min-height: 300px;
          background: white;
          border: 1px solid #ddd;
          border-radius: 4px;
          overflow: hidden;
        ">
      <canvas id="analysisCanvas" style="display: block; width: 100%"></canvas>
    </div>
    <div id="tooltip"></div>
  </div>

  <script src="../informer.js"></script>

  <script>
    let InformerLib = null;
    let isReady = false;

    const statusDiv = document.getElementById("status");
    const analyzeBtn = document.getElementById("analyzeBtn");
    analyzeBtn.disabled = true;
    const timeResults = document.getElementById("timeResults");
    const freqResults = document.getElementById("freqResults");
    const audioFileInput = document.getElementById("audioFile");
    const canvas = document.getElementById("analysisCanvas");
    const ctx = canvas.getContext("2d");

    // Load Informer WASM module
    InformerModule()
      .then((Module) => {
        InformerLib = Module;
        isReady = true;
        statusDiv.textContent = "✓ Informer.js loaded and ready!";
        statusDiv.className = "status ready";
        console.log("Informer WASM library loaded successfully");
      })
      .catch((error) => {
        statusDiv.textContent = "✗ Error loading Informer library";
        statusDiv.className = "status error";
        console.error("Failed to load Informer:", error);
      });

    // Perform FFT and get magnitudes
    // Analyze an audio buffer in overlapping chunks and visualize
    // Global state for visualization
    // Helper: Compute linear-magnitude FFT using OfflineAudioContext
    async function computeFFTMagnitudes(chunk, fftSize, sampleRate) {
      // Ensure input is Float32Array
      const float32Data = new Float32Array(chunk);
      let data;
      if (float32Data.length >= fftSize) {
        data = float32Data.slice(0, fftSize);
      } else {
        data = new Float32Array(fftSize);
        data.set(float32Data);
      }

      // Create offline context
      const OfflineAudioContext =
        window.OfflineAudioContext || window.webkitOfflineAudioContext;
      const offlineCtx = new OfflineAudioContext(1, fftSize, sampleRate);

      const audioBuffer = offlineCtx.createBuffer(1, fftSize, sampleRate);
      audioBuffer.copyToChannel(data, 0);

      const source = offlineCtx.createBufferSource();
      source.buffer = audioBuffer;

      const analyser = offlineCtx.createAnalyser();
      analyser.fftSize = fftSize;
      analyser.smoothingTimeConstant = 0;

      source.connect(analyser);
      analyser.connect(offlineCtx.destination);
      source.start(0);

      await offlineCtx.startRendering();

      // Get frequency data in dB
      const freqData = new Float32Array(analyser.frequencyBinCount);
      analyser.getFloatFrequencyData(freqData);

      // Convert dB to linear magnitude
      const magnitudes = new Float64Array(freqData.length);
      for (let i = 0; i < freqData.length; i++) {
        if (freqData[i] < -1000) {
          magnitudes[i] = 0.0;
        } else {
          magnitudes[i] = Math.pow(10, freqData[i] / 20.0);
        }
      }
      return magnitudes;
    }

    // Analyze audio buffer and compute multiple descriptors over time
    async function analyzeAudioBuffer(audioBuffer, sampleRate, fftSize) {
      const totalSamples = audioBuffer.length;
      const hopSize = fftSize / 2;
      const numFrames = Math.max(
        1,
        Math.floor((totalSamples - fftSize) / hopSize) + 1
      );

      // Initialize descriptor arrays
      const descriptors = {};
      const descriptorRanges = {};
      for (const key of allDescriptorKeys) {
        descriptors[key] = [];
        descriptorRanges[key] = { min: Infinity, max: -Infinity };
      }

      const times = [];
      const waveform = Array.from(audioBuffer);
      const duration = totalSamples / sampleRate;
      const magnitudesMatrix = []; // one Float64Array of bin magnitudes per frame, for the spectrogram
      let decodedAudioData = null;
      let originalFileName = null;

      // Create one Informer instance for the entire analysis
      const informer = new InformerLib.Informer(sampleRate, 0.85, fftSize);

      for (let i = 0; i < numFrames; i++) {
        const start = i * hopSize;
        const end = start + fftSize;
        if (end > totalSamples) break;

        const chunk = audioBuffer.slice(start, end);

        // Time domain descriptors
        informer.setBuffer(new Float64Array(chunk));
        informer.computeDescriptors(true, false);
        const timeDesc = informer.getTimeDescriptors();

        // Helper to safely push and track range
        function pushValue(key, val) {
          val = val || 0;
          descriptors[key].push(val);
          if (val < descriptorRanges[key].min)
            descriptorRanges[key].min = val;
          if (val > descriptorRanges[key].max)
            descriptorRanges[key].max = val;
        }

        // Time descriptors, with clamping where appropriate
        pushValue("peak", Math.min(1, Math.abs(timeDesc.peak || 0)));
        pushValue("rms", Math.min(1, timeDesc.rms || 0));
        pushValue("variance", Math.min(1, timeDesc.variance || 0));
        pushValue("zcr", Math.min(1, timeDesc.zerocrossing || 0));
        pushValue("skewnessTime", timeDesc.skewness || 0);
        pushValue("kurtosisTime", timeDesc.kurtosis || 0);

        // Frequency domain descriptors
        const magnitudes = await computeFFTMagnitudes(
          chunk,
          fftSize,
          sampleRate
        );
        magnitudesMatrix.push(magnitudes);

        informer.setMagnitudes(magnitudes);
        informer.computeDescriptors(false, true);
        const freqDesc = informer.getFrequencyDescriptors();

        // Frequency descriptors, with clamping where appropriate
        //pushValue("f0", freqDesc.f0 || 0);
        pushValue("centroid", freqDesc.centroid || 0);
        pushValue("peakFreq", freqDesc.peak || 0);
        pushValue("rolloff", freqDesc.rolloff || 0);
        pushValue("spread", freqDesc.spread || 0);
        pushValue(
          "flatness",
          Math.min(1, Math.max(0, freqDesc.flatness || 0))
        );
        pushValue("entropy", Math.min(1, Math.max(0, freqDesc.entropy || 0)));
        pushValue(
          "irregularity",
          Math.min(2, Math.max(0, freqDesc.irregularity || 0))
        );
        pushValue("crest", freqDesc.crestfactor || 0);
        pushValue("flux", freqDesc.flux * 10000.0 || 0); // Multiplication because of usually very small numbers
        pushValue("slope", freqDesc.slope * 1000000.0 || 0); // Same as above
        pushValue("decrease", freqDesc.decrease || 0);
        pushValue("skewnessFreq", freqDesc.skewness || 0);
        pushValue("kurtosisFreq", freqDesc.kurtosis || 0);

        times.push(start / sampleRate);
      }

      // Clean up at the end
      informer.delete();

      // Finalize ranges
      for (const key of allDescriptorKeys) {
        if (descriptorRanges[key].min === Infinity) {
          descriptorRanges[key] = { min: 0, max: 1 };
        } else if (descriptorRanges[key].min === descriptorRanges[key].max) {
          const val = descriptorRanges[key].min;
          descriptorRanges[key].min = val - 0.1 * Math.abs(val || 1);
          descriptorRanges[key].max = val + 0.1 * Math.abs(val || 1);
        }
      }

      analysisData = {
        times,
        duration,
        sampleRate,
        waveform,
        descriptors,
        descriptorRanges,
        magnitudesMatrix,
        spectrogramImage: buildSpectrogramImage(magnitudesMatrix),
      };
      drawAnalysis();
      renderDescriptorLegend();
    }

    // --- Spectrogram -----------------------------------------------------
    // Hand-rolled "magma-like" colormap (a handful of stops, linearly
    // interpolated) so we don't need to pull in an external colormap library.
    const SPECTROGRAM_COLOR_STOPS = [
      [0.0, [0, 0, 4]],
      [0.13, [40, 11, 84]],
      [0.26, [101, 21, 110]],
      [0.39, [159, 42, 99]],
      [0.52, [212, 72, 66]],
      [0.65, [245, 125, 21]],
      [0.78, [250, 193, 39]],
      [1.0, [252, 255, 164]],
    ];

    function spectrogramColor(t) {
      t = Math.max(0, Math.min(1, t));
      for (let i = 0; i < SPECTROGRAM_COLOR_STOPS.length - 1; i++) {
        const [t0, c0] = SPECTROGRAM_COLOR_STOPS[i];
        const [t1, c1] = SPECTROGRAM_COLOR_STOPS[i + 1];
        if (t >= t0 && t <= t1) {
          const f = t1 === t0 ? 0 : (t - t0) / (t1 - t0);
          return [
            Math.round(c0[0] + (c1[0] - c0[0]) * f),
            Math.round(c0[1] + (c1[1] - c0[1]) * f),
            Math.round(c0[2] + (c1[2] - c0[2]) * f),
          ];
        }
      }
      return SPECTROGRAM_COLOR_STOPS[SPECTROGRAM_COLOR_STOPS.length - 1][1];
    }

    // Renders the whole spectrogram once, at native (numFrames x numBins)
    // resolution, into an off-screen canvas. drawSpectrogram() then just
    // blits/scales that image, so window resizes stay cheap.
    function buildSpectrogramImage(magnitudesMatrix) {
      const numFrames = magnitudesMatrix.length;
      if (numFrames === 0) return null;
      const numBins = magnitudesMatrix[0].length;

      const DB_FLOOR = -160; // treat anything below this as silence
      const dbMatrix = new Array(numFrames);
      let maxDb = -Infinity;

      for (let i = 0; i < numFrames; i++) {
        const bins = magnitudesMatrix[i];
        const db = new Float32Array(numBins);
        for (let b = 0; b < numBins; b++) {
          const mag = bins[b];
          const d = mag > 1e-8 ? 20 * Math.log10(mag) : DB_FLOOR;
          db[b] = d;
          if (d > maxDb) maxDb = d;
        }
        dbMatrix[i] = db;
      }
      if (maxDb === -Infinity) maxDb = 0;

      // Display a fixed dynamic range below the loudest frame/bin, which is
      // the usual convention for audio spectrograms.
      const DYNAMIC_RANGE_DB = 80;
      const floor = maxDb - DYNAMIC_RANGE_DB;
      const range = maxDb - floor || 1;

      const off = document.createElement("canvas");
      off.width = numFrames;
      off.height = numBins;
      const octx = off.getContext("2d");
      const imgData = octx.createImageData(numFrames, numBins);

      for (let i = 0; i < numFrames; i++) {
        const db = dbMatrix[i];
        for (let b = 0; b < numBins; b++) {
          const norm = Math.max(0, Math.min(1, (db[b] - floor) / range));
          const [r, g, bl] = spectrogramColor(norm);
          // Flip vertically: bin 0 (lowest frequency) should render at the
          // bottom of the image.
          const row = numBins - 1 - b;
          const idx = (row * numFrames + i) * 4;
          imgData.data[idx] = r;
          imgData.data[idx + 1] = g;
          imgData.data[idx + 2] = bl;
          imgData.data[idx + 3] = 255;
        }
      }
      octx.putImageData(imgData, 0, 0);
      return off;
    }

    function drawSpectrogram(width, y, height) {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, y, width, height);

      const plotWidth = width - 60;
      const img = analysisData && analysisData.spectrogramImage;

      if (img) {
        const wasSmoothing = ctx.imageSmoothingEnabled;
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(img, 0, 0, img.width, img.height, 60, y, plotWidth, height);
        ctx.imageSmoothingEnabled = wasSmoothing;
      }

      // Y-axis labels (frequency)
      const nyquist = analysisData.sampleRate / 2;
      ctx.textAlign = "right";
      ctx.fillStyle = "#ccc";
      ctx.font = "12px Arial";
      ctx.fillText(Math.round(nyquist).toLocaleString() + " Hz", 55, y + 12);
      ctx.fillText("0 Hz", 55, y + height - 4);

      ctx.textAlign = "right";
      ctx.fillStyle = "#fff";
      ctx.fillText("Spectrogram", width - 10, y + 16);

      ctx.strokeStyle = "#ddd";
      ctx.strokeRect(0, y, width, height);
    }

    // Descriptor metadata: name, min, max, unit, category
    const descriptorMeta = {
      // Time Domain
      peak: { min: 0, max: 1, unit: "", category: "time", label: "Peak" },
      rms: { min: 0, max: 1, unit: "", category: "time", label: "RMS" },
      variance: {
        min: 0,
        max: 1,
        unit: "",
        category: "time",
        label: "Variance",
      },
      zcr: {
        min: 0,
        max: 1,
        unit: "",
        category: "time",
        label: "Zero Crossing Rate",
      },
      skewnessTime: {
        min: -10,
        max: 10,
        unit: "",
        category: "time",
        label: "Skewness (Time)",
      },
      kurtosisTime: {
        min: -10,
        max: 50,
        unit: "",
        category: "time",
        label: "Kurtosis (Time)",
      },

      // Frequency Domain
      /*f0: {
        min: 0,
        max: "nyquist",
        unit: "Hz",
        category: "freq",
        label: "Fundamental Frequency",
      },*/
      centroid: {
        min: 0,
        max: "nyquist",
        unit: "Hz",
        category: "freq",
        label: "Spectral Centroid",
      },
      peakFreq: {
        min: 0,
        max: "nyquist",
        unit: "Hz",
        category: "freq",
        label: "Spectral Peak",
      },
      rolloff: {
        min: 0,
        max: "nyquist",
        unit: "Hz",
        category: "freq",
        label: "Spectral Rolloff",
      },
      spread: {
        min: 0,
        max: "nyquist/2",
        unit: "Hz",
        category: "freq",
        label: "Spectral Spread",
      },
      flatness: {
        min: 0,
        max: 1,
        unit: "",
        category: "freq",
        label: "Spectral Flatness",
      },
      entropy: {
        min: 0,
        max: 1,
        unit: "",
        category: "freq",
        label: "Spectral Entropy",
      },
      irregularity: {
        min: 0,
        max: 2,
        unit: "",
        category: "freq",
        label: "Spectral Irregularity",
      },
      crest: {
        min: 0,
        max: 100,
        unit: "",
        category: "freq",
        label: "Crest Factor",
      },
      flux: {
        min: 0,
        max: 1000,
        unit: "",
        category: "freq",
        label: "Spectral Flux",
      },
      slope: {
        min: -1,
        max: 1,
        unit: "",
        category: "freq",
        label: "Spectral Slope",
      },
      decrease: {
        min: -1,
        max: 1,
        unit: "",
        category: "freq",
        label: "Spectral Decrease",
      },
      skewnessFreq: {
        min: -10,
        max: 10,
        unit: "",
        category: "freq",
        label: "Skewness (Freq)",
      },
      kurtosisFreq: {
        min: -10,
        max: 50,
        unit: "",
        category: "freq",
        label: "Kurtosis (Freq)",
      },
    };

    const tooltip = document.getElementById("tooltip");

    canvas.addEventListener("mousemove", handleMouseMove);
    canvas.addEventListener("mouseleave", () => {
      tooltip.style.display = "none";
    });

    function handleMouseMove(e) {
      if (!analysisData) return;

      const container = document.getElementById("canvasContainer");
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      // Get time from X position
      const containerWidth = container.clientWidth;
      const plotWidth = containerWidth - 60;
      const time = ((mouseX - 60) / plotWidth) * analysisData.duration;

      // Ignore if outside plot area
      if (
        mouseX < 60 ||
        mouseX > containerWidth ||
        time < 0 ||
        time > analysisData.duration
      ) {
        tooltip.style.display = "none";
        return;
      }

      // Determine which zone (descriptor track, overlay, waveform,
      // spectrogram) is being hovered, using the same layout drawAnalysis used.
      const layout = getLayout(containerWidth);
      const visibleList = layout.visibleList;

      let hoveredDescriptors = []; // one in per-track mode, all overlaid ones in overlay mode
      let isOverWaveform = false;
      let isOverSpectrogram = false;

      if (layout.overlayMode) {
        if (mouseY >= layout.tracksY && mouseY <= layout.tracksY + layout.overlayHeight) {
          hoveredDescriptors = visibleList;
        }
      } else {
        for (let i = 0; i < visibleList.length; i++) {
          const yTop = layout.tracksY + i * layout.trackHeight;
          const yBottom = yTop + layout.trackHeight;
          if (mouseY >= yTop && mouseY <= yBottom) {
            hoveredDescriptors = [visibleList[i]];
            break;
          }
        }
      }

      isOverWaveform = mouseY >= layout.waveformY && mouseY <= layout.waveformY + layout.waveformHeight;
      isOverSpectrogram =
        layout.showSpectrogram &&
        mouseY >= layout.spectrogramY &&
        mouseY <= layout.spectrogramY + layout.spectrogramHeight;

      // Find nearest frame index
      const times = analysisData.times;
      let frameIndex = 0;
      let minDist = Math.abs(times[0] - time);
      for (let i = 1; i < times.length; i++) {
        const dist = Math.abs(times[i] - time);
        if (dist < minDist) {
          minDist = dist;
          frameIndex = i;
        }
      }

      const actualTime = times[frameIndex];

      // Build tooltip content
      let content = `<strong>${actualTime.toFixed(3)} s</strong><br>`;

      if (hoveredDescriptors.length > 0) {
        content += hoveredDescriptors
          .map((key) => {
            const value = analysisData.descriptors[key][frameIndex];
            const unit = descriptorMeta[key].unit;
            return `${descriptorMeta[key].label}: ${value.toFixed(4)}${unit ? " " + unit : ""}`;
          })
          .join("<br>");
      } else if (isOverSpectrogram) {
        // Estimate frequency from vertical position, and magnitude from the
        // nearest frame/bin in the stored matrix.
        const nyquist = analysisData.sampleRate / 2;
        const relY = (mouseY - layout.spectrogramY) / layout.spectrogramHeight;
        const freq = nyquist * (1 - relY);

        const matrix = analysisData.magnitudesMatrix;
        const bins = matrix && matrix[frameIndex];
        let magText = "";
        if (bins && bins.length > 0) {
          const binIndex = Math.min(
            bins.length - 1,
            Math.max(0, Math.round((freq / nyquist) * (bins.length - 1)))
          );
          const mag = bins[binIndex];
          const db = mag > 1e-8 ? 20 * Math.log10(mag) : -Infinity;
          magText = `<br>${db === -Infinity ? "-inf" : db.toFixed(1)} dB`;
        }
        content += `Spectrogram: ${freq.toFixed(0)} Hz${magText}`;
      } else if (isOverWaveform) {
        // Estimate waveform sample (resample)
        const waveform = analysisData.waveform;
        const sampleIndex = Math.round(
          (actualTime / analysisData.duration) * waveform.length
        );
        const sample =
          sampleIndex >= 0 && sampleIndex < waveform.length
            ? waveform[sampleIndex]
            : 0;
        content += `Waveform: ${sample.toFixed(4)}`;
      } else {
        tooltip.style.display = "none";
        return;
      }

      // Position and show tooltip
      tooltip.innerHTML = content;
      tooltip.style.left = mouseX + 10 + "px";
      tooltip.style.top = mouseY + 10 + "px";
      tooltip.style.display = "block";
    }

    const allDescriptorKeys = Object.keys(descriptorMeta);
    let analysisData = null;
    const visibleDescriptors = new Set(["centroid"]); // default

    // Distinct colors for "overlay" mode, where several descriptors share one
    // track. Assigned by stable index so a descriptor keeps the same color
    // across re-renders and selections.
    const OVERLAY_PALETTE = [
      "#e6194b", "#3cb44b", "#4363d8", "#f58231", "#911eb4",
      "#42d4f4", "#f032e6", "#bfef45", "#fabed4", "#469990",
      "#dcbeff", "#9A6324", "#800000", "#aaffc3", "#808000",
      "#ffd8b1", "#000075", "#a9a9a9",
    ];
    function overlayColorFor(key) {
      const idx = allDescriptorKeys.indexOf(key);
      return OVERLAY_PALETTE[idx % OVERLAY_PALETTE.length];
    }

    // One-pole (exponential) low-pass smoothing, applied per descriptor
    // series before plotting. alpha = 1 means no smoothing at all; smaller
    // alpha means heavier smoothing. Kept purely a display-time transform —
    // CSV export always writes the raw, unsmoothed descriptor values.
    function smoothSeries(values, alpha) {
      if (!values || values.length === 0 || alpha >= 1) return values;
      const out = new Array(values.length);
      out[0] = values[0];
      for (let i = 1; i < values.length; i++) {
        out[i] = alpha * values[i] + (1 - alpha) * out[i - 1];
      }
      return out;
    }

    function getSmoothingAlpha() {
      const enabled = document.getElementById("smoothToggle").checked;
      if (!enabled) return 1;
      const amount = parseFloat(document.getElementById("smoothAmount").value);
      return 1 - amount; // amount is "smoothing strength", 0 (none) .. 0.95 (heavy)
    }

    // Shared layout math, used by both drawAnalysis() and handleMouseMove()
    // so the hit-testing always matches what's actually drawn.
    function getLayout(width) {
      const overlayMode = document.getElementById("overlayToggle").checked;
      const showSpectrogram = document.getElementById("spectrogramToggle").checked;
      const visibleList = allDescriptorKeys.filter((k) => visibleDescriptors.has(k));

      const trackHeight = 100;
      const overlayHeight = 220;
      const waveformHeight = 80;
      const spectrogramHeight = showSpectrogram ? 150 : 0;
      const topMargin = 20;
      const bottomMargin = 20;

      const tracksHeight = overlayMode
        ? (visibleList.length > 0 ? overlayHeight : 0)
        : visibleList.length * trackHeight;

      const tracksY = topMargin;
      const waveformY = tracksY + tracksHeight;
      const spectrogramY = waveformY + waveformHeight;
      const totalHeight = spectrogramY + spectrogramHeight + bottomMargin;

      return {
        overlayMode,
        showSpectrogram,
        visibleList,
        trackHeight,
        overlayHeight,
        waveformHeight,
        spectrogramHeight,
        topMargin,
        tracksY,
        waveformY,
        spectrogramY,
        totalHeight,
      };
    }

    function drawAnalysis() {
      if (!analysisData) return;

      const { times, duration, sampleRate, waveform, descriptors } =
        analysisData;

      // Get correct width from container
      const container = document.getElementById("canvasContainer");
      if (!container) return;
      const width = container.clientWidth;

      const layout = getLayout(width);
      const smoothAlpha = getSmoothingAlpha();

      // Apply height to container
      container.style.height = layout.totalHeight + "px";

      // Set canvas dimensions in pixels
      canvas.width = width;
      canvas.height = layout.totalHeight;

      ctx.clearRect(0, 0, width, layout.totalHeight);

      if (layout.overlayMode) {
        if (layout.visibleList.length > 0) {
          drawOverlayTrack(
            layout.visibleList,
            descriptors,
            times,
            duration,
            layout.tracksY,
            layout.overlayHeight,
            width,
            smoothAlpha
          );
        }
      } else {
        let currentY = layout.tracksY;
        for (const key of layout.visibleList) {
          drawTrack(
            key,
            descriptors[key],
            times,
            duration,
            sampleRate,
            currentY,
            layout.trackHeight,
            width,
            smoothAlpha
          );
          currentY += layout.trackHeight;
        }
      }

      drawWaveform(waveform, width, layout.totalHeight, layout.waveformHeight, layout.waveformY);

      if (layout.showSpectrogram) {
        drawSpectrogram(width, layout.spectrogramY, layout.spectrogramHeight);
      }
    }

    // Draws every visible descriptor overlaid on a single track, each
    // independently normalized to its own [min, max] range and colored from
    // OVERLAY_PALETTE. Useful for spotting how descriptors move together.
    function drawOverlayTrack(keys, descriptors, times, duration, y, height, width, smoothAlpha) {
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, y, width, height);

      // Grid lines
      ctx.strokeStyle = "#eee";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(60, y + height);
      ctx.lineTo(width, y + height);
      ctx.moveTo(60, y + height / 2);
      ctx.lineTo(width, y + height / 2);
      ctx.moveTo(60, y);
      ctx.lineTo(width, y);
      ctx.stroke();

      // Axis labels — values are per-descriptor normalized, so label the
      // scale rather than real units.
      ctx.textAlign = "right";
      ctx.fillStyle = "#555";
      ctx.font = "12px Arial";
      ctx.fillText("max", 55, y + 16);
      ctx.fillText("min", 55, y + height - 5);

      ctx.textAlign = "right";
      ctx.fillStyle = "#000";
      ctx.fillText("Overlay (normalized)", width - 10, y + 16);

      const plotWidth = width - 60;

      for (const key of keys) {
        const rawValues = descriptors[key];
        if (!rawValues || rawValues.length < 2) continue;
        const values = smoothSeries(rawValues, smoothAlpha);

        const range = analysisData.descriptorRanges[key];
        let actualMin = range.min;
        let actualMax = range.max;
        if (actualMax !== actualMin) {
          const pad = (actualMax - actualMin) * 0.05;
          actualMin -= pad;
          actualMax += pad;
        } else {
          const pad = Math.abs(actualMin) * 0.1 || 0.1;
          actualMin -= pad;
          actualMax += pad;
        }

        ctx.strokeStyle = overlayColorFor(key);
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < times.length; i++) {
          const x = 60 + (times[i] / duration) * plotWidth;
          let norm = actualMax !== actualMin ? (values[i] - actualMin) / (actualMax - actualMin) : 0;
          norm = Math.max(0, Math.min(1, norm));
          const valY = y + (1 - norm) * height;
          if (i === 0) ctx.moveTo(x, valY);
          else ctx.lineTo(x, valY);
        }
        ctx.stroke();
      }

      ctx.strokeStyle = "#ddd";
      ctx.strokeRect(0, y, width, height);
    }

    function drawTrack(
      key,
      values,
      times,
      duration,
      sampleRate,
      y,
      height,
      width,
      smoothAlpha
    ) {
      const data = analysisData.descriptorRanges[key];
      let actualMin = data.min;
      let actualMax = data.max;

      // Add 5% padding to range (unless range is zero)
      if (actualMax !== actualMin) {
        const range = actualMax - actualMin;
        const padding = range * 0.05;
        actualMin -= padding;
        actualMax += padding;
      } else {
        const padding = Math.abs(actualMin) * 0.1 || 0.1;
        actualMin -= padding;
        actualMax += padding;
      }

      // Clamp display range to ≥ 0 for frequency-in-Hz descriptors
      const nonNegativeDescriptors = new Set(['centroid', 'rolloff', 'peakFreq', 'spread']);
      if (nonNegativeDescriptors.has(key)) {
        actualMin = Math.max(0, actualMin);
        actualMax = Math.max(0, actualMax); // safety, though max should already be ≥0
      }

      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, y, width, height);

      // Y-axis labels (left)
      ctx.textAlign = "right";
      ctx.fillStyle = "#555";
      ctx.font = "12px Arial";
      const minLabel = actualMin.toLocaleString(undefined, {
        maximumFractionDigits: 2,
      });
      const maxLabel = actualMax.toLocaleString(undefined, {
        maximumFractionDigits: 2,
      });
      ctx.fillText(minLabel, 55, y + height - 5); // bottom = min
      ctx.fillText(maxLabel, 55, y + 16); // top = max

      // Descriptor name (top-right)
      ctx.textAlign = "right";
      ctx.fillStyle = "#000";
      const label = descriptorMeta[key].label;
      const unit = descriptorMeta[key].unit
        ? ` (${descriptorMeta[key].unit})`
        : "";
      ctx.fillText(`${label}${unit}`, width - 10, y + 16);

      // Grid lines
      ctx.strokeStyle = "#eee";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(60, y + height);
      ctx.lineTo(width, y + height);
      ctx.moveTo(60, y + height / 2);
      ctx.lineTo(width, y + height / 2);
      ctx.moveTo(60, y);
      ctx.lineTo(width, y);
      ctx.stroke();

      // Curve, with color by category
      if (values.length > 1) {
        const color =
          descriptorMeta[key].category === "time" ? "#388E3C" : "#D32F2F";
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        const plotWidth = width - 60;
        const plotValues = smoothSeries(values, smoothAlpha || 1);
        for (let i = 0; i < times.length; i++) {
          const x = 60 + (times[i] / duration) * plotWidth;
          // Use padded range for normalization
          let norm =
            actualMax !== actualMin
              ? (plotValues[i] - actualMin) / (actualMax - actualMin)
              : 0;
          norm = Math.max(0, Math.min(1, norm));
          const valY = y + (1 - norm) * height;
          if (i === 0) ctx.moveTo(x, valY);
          else ctx.lineTo(x, valY);
        }
        ctx.stroke();
      }

      // Border
      ctx.strokeStyle = "#ddd";
      ctx.strokeRect(0, y, width, height);
    }

    function drawWaveform(waveform, width, totalHeight, height, y) {
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, y, width, height);

      const plotWidth = width - 60;
      ctx.strokeStyle = "#4A90E2";
      ctx.lineWidth = 1;
      ctx.beginPath();

      // ✅ Explicitly map [-1, 1] to [y + height (bottom), y (top)]
      for (let i = 0; i < waveform.length; i++) {
        const x = 60 + (i / waveform.length) * plotWidth;
        // Clamp sample to [-1, 1] for safety
        const clamped = Math.max(-1, Math.min(1, waveform[i]));
        // Map: -1 → bottom (y + height), +1 → top (y)
        const wy = y + height - ((clamped + 1) / 2) * height;
        if (i === 0) ctx.moveTo(x, wy);
        else ctx.lineTo(x, wy);
      }
      ctx.stroke();

      // Baseline at y = 0 (center)
      ctx.strokeStyle = "#999";
      ctx.setLineDash([4, 2]);
      ctx.beginPath();
      ctx.moveTo(60, y + height / 2);
      ctx.lineTo(width, y + height / 2);
      ctx.stroke();
      ctx.setLineDash([]);

      // Y-axis labels for waveform
      ctx.textAlign = "right";
      ctx.fillStyle = "#555";
      ctx.font = "12px Arial";
      ctx.fillText("1", 55, y + 16); // top
      ctx.fillText("0", 55, y + height / 2 + 4);
      ctx.fillText("-1", 55, y + height - 4); // bottom

      // Label
      ctx.textAlign = "right";
      ctx.fillStyle = "#000";
      ctx.fillText("Waveform", width - 10, y + 16);

      ctx.strokeStyle = "#ddd";
      ctx.strokeRect(0, y, width, height);
    }

    function renderDescriptorLegend() {
      const timeContainer = document.getElementById("time-descriptor-legend");
      const freqContainer = document.getElementById("freq-descriptor-legend");

      if (!timeContainer || !freqContainer) return;

      // Clear containers
      timeContainer.innerHTML =
        '<strong style="color:#388E3C; margin-right:10px;">⏱️ Time:</strong>';
      freqContainer.innerHTML =
        '<strong style="color:#D32F2F; margin-right:10px;">📊 Frequency:</strong>';

      const overlayMode = document.getElementById("overlayToggle").checked;

      allDescriptorKeys.forEach((key) => {
        const meta = descriptorMeta[key];
        const item = document.createElement("span");
        item.style.cursor = "pointer";
        item.style.padding = "4px 8px";
        item.style.borderRadius = "4px";
        item.style.fontSize = "12px";
        item.style.fontWeight = visibleDescriptors.has(key)
          ? "bold"
          : "normal";
        item.style.display = "inline-flex";
        item.style.alignItems = "center";
        item.style.gap = "5px";

        // In overlay mode, show a swatch matching the line color used in
        // the combined view, so the legend doubles as a color key.
        if (overlayMode && visibleDescriptors.has(key)) {
          const swatch = document.createElement("span");
          swatch.style.display = "inline-block";
          swatch.style.width = "10px";
          swatch.style.height = "10px";
          swatch.style.borderRadius = "50%";
          swatch.style.backgroundColor = overlayColorFor(key);
          item.appendChild(swatch);
        }

        const labelSpan = document.createElement("span");
        labelSpan.textContent = meta.label;
        item.appendChild(labelSpan);

        const isTime = meta.category === "time";
        const activeColor = isTime ? "#388E3C" : "#D32F2F";
        const bgColor = visibleDescriptors.has(key)
          ? isTime
            ? "#e8f5e9"
            : "#ffebee"
          : "#f5f5f5";

        item.style.backgroundColor = bgColor;
        item.style.border = `1px solid ${visibleDescriptors.has(key) ? activeColor : "#ccc"
          }`;
        item.style.color = "#333";

        item.addEventListener("click", () => {
          if (visibleDescriptors.has(key)) {
            visibleDescriptors.delete(key);
          } else {
            visibleDescriptors.add(key);
          }
          drawAnalysis();
          renderDescriptorLegend();
        });

        if (isTime) {
          timeContainer.appendChild(item);
        } else {
          freqContainer.appendChild(item);
        }
      });
    }

    // Display results
    function displayResults(descriptors, elementId) {
      const element = document.getElementById(elementId);
      element.innerHTML = "";

      const entries = Object.entries(descriptors);
      if (entries.length === 0) {
        element.innerHTML = "<p>No descriptors computed</p>";
        return;
      }

      entries.forEach(([name, value]) => {
        const div = document.createElement("div");
        div.className = "descriptor";
        div.innerHTML = `
                    <span class="descriptor-name">${name}:</span>
                    <span class="descriptor-value">${value.toFixed(6)}</span>
                `;
        element.appendChild(div);
      });
    }

    // Event listener
    analyzeBtn.addEventListener("click", async () => {
      if (!decodedAudioData) {
        alert("Please upload a valid audio file first.");
        return;
      }

      const fftSize = parseInt(document.getElementById("fftSize").value);
      const { channelData, sampleRate } = decodedAudioData;

      statusDiv.textContent = "🔬 Analyzing audio...";
      statusDiv.className = "status loading";

      try {
        await analyzeAudioBuffer(channelData, sampleRate, fftSize);
        document.getElementById("downloadCsvBtn").disabled = false;
        statusDiv.textContent = "✓ Analysis complete!";
        statusDiv.className = "status ready";
      } catch (err) {
        statusDiv.textContent = "✗ Analysis error: " + err.message;
        statusDiv.className = "status error";
        document.getElementById("downloadCsvBtn").disabled = true;
        console.error(err);
      }
    });

    console.log("FFT implementation loaded");

    audioFileInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) {
        decodedAudioData = null;
        originalFileName = null;
        analyzeBtn.disabled = true;
        document.getElementById("downloadCsvBtn").disabled = true;
        return;
      }

      // ✅ Store clean filename (without extension)
      originalFileName = file.name.replace(/\.[^/.]+$/, "");

      statusDiv.textContent = "✓ Decoding audio file...";
      statusDiv.className = "status ready";

      try {
        const arrayBuffer = await file.arrayBuffer();
        const audioContext = new (window.AudioContext ||
          window.webkitAudioContext)();
        const decoded = await audioContext.decodeAudioData(arrayBuffer);

        decodedAudioData = {
          channelData: decoded.getChannelData(0),
          sampleRate: decoded.sampleRate,
        };

        analyzeBtn.disabled = false;
        document.getElementById("downloadCsvBtn").disabled = true; // ← CSV not ready yet
        statusDiv.textContent =
          "✓ File loaded. Click 'Analyze Audio' to proceed.";
      } catch (err) {
        decodedAudioData = null;
        originalFileName = null;
        analyzeBtn.disabled = true;
        document.getElementById("downloadCsvBtn").disabled = true;
        statusDiv.textContent = "✗ Error decoding audio: " + err.message;
        statusDiv.className = "status error";
        console.error(err);
      }
    });

    // Download CSV button
    document
      .getElementById("downloadCsvBtn")
      .addEventListener("click", () => {
        if (!analysisData) {
          alert("Please analyze audio first.");
          return;
        }

        const { times, descriptors } = analysisData;
        const fftSize = document.getElementById("fftSize").value;

        // Build CSV: header row
        let csv = "Time," + times.map((t) => t.toFixed(6)).join(",") + "\n";

        // Add each descriptor as a row
        allDescriptorKeys.forEach((key) => {
          const values = descriptors[key] || [];
          const row = times.map((_, i) =>
            i < values.length ? values[i].toFixed(6) : ""
          );
          csv += `"${descriptorMeta[key].label}",${row.join(",")}\n`;
        });

        // Generate filename
        const fileName = originalFileName
          ? `${originalFileName}-${fftSize}.csv`
          : `informer-analysis-${fftSize}.csv`;

        // Trigger download
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
        URL.revokeObjectURL(link.href);
      });

    // New view-option controls: spectrogram, overlay mode, smoothing
    document.getElementById("spectrogramToggle").addEventListener("change", () => {
      if (analysisData) drawAnalysis();
    });

    document.getElementById("overlayToggle").addEventListener("change", () => {
      if (analysisData) drawAnalysis();
      renderDescriptorLegend();
    });

    const smoothToggleEl = document.getElementById("smoothToggle");
    const smoothAmountGroupEl = document.getElementById("smoothAmountGroup");
    const smoothAmountEl = document.getElementById("smoothAmount");
    const smoothAmountValueEl = document.getElementById("smoothAmountValue");

    smoothToggleEl.addEventListener("change", () => {
      smoothAmountGroupEl.style.display = smoothToggleEl.checked ? "" : "none";
      if (analysisData) drawAnalysis();
    });

    smoothAmountEl.addEventListener("input", () => {
      smoothAmountValueEl.textContent = parseFloat(smoothAmountEl.value).toFixed(2);
      if (analysisData) drawAnalysis();
    });

    // Handle window resize (e.g. rotate phone)
    let resizeTimeout;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        if (analysisData) {
          drawAnalysis();
        }
      }, 250);
    });
  </script>
</body>
